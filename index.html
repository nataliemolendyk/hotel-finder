<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Finder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <h1>Hotel Finder</h1>
        <p>Search hotels worldwide</p>
      </div>

      <div class="header-actions">
        <button class="favorites-toggle-btn" id="toggleFavs">
          <span class="fav-icon">♡</span>
          Favorites
        </button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="filter-bar" id="filterBar">
      <div class="filter-group filter-group-search">
        <label for="searchInput">City</label>
        <input id="searchInput" placeholder="e.g. Las Vegas" />
      </div>
      <div class="filter-group filter-group-btn">
        <label>&nbsp;</label>
        <button id="searchBtn">Search</button>
      </div>
      <div class="filter-group">
        <label for="filterMaxPrice">Max Price</label>
        <input type="number" id="filterMaxPrice" placeholder="No max" min="0" />
      </div>
      <div class="filter-group">
        <label for="filterMinRating">Min Rating</label>
        <select id="filterMinRating">
          <option value="">Any</option>
          <option value="4.5">4.5 ★</option>
          <option value="4.0">4.0 ★</option>
          <option value="3.5">3.5 ★</option>
          <option value="3.0">3.0 ★</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterSort">Sort By</label>
        <select id="filterSort">
          <option value="">Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating-desc">Rating: High → Low</option>
        </select>
      </div>
      <div class="filter-group filter-group-actions">
        <label>&nbsp;</label>
        <button class="clear-filters-btn" id="clearFiltersBtn">Clear Filters</button>
      </div>
    </div>
    <div id="results"></div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
