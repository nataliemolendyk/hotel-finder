<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Finder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <h1>Hotel Finder</h1>
          <p>Discover hotels in any city.</p>
        </div>
      </header>

      <main>
        <section class="card">
          <div class="results-header">
            <h2 id="airport-heading">Hotel results</h2>
          </div>
          <div id="results" class="results-list">
            <p class="loading">Loading hotels…</p>
          </div>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
